version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ark_postgres
    environment:
      POSTGRES_USER: ark_user
      POSTGRES_PASSWORD: ark_pass_change_me
      POSTGRES_DB: ark_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ark_user -d ark_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ark_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://ark_user:ark_pass_change_me@postgres:5432/ark_db
    command: bash -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
