worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;  # Don't reveal Nginx version

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;

    # ── Upstream Backend ──────────────────────────────────────────────────────
    upstream ark_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP Server (redirects to HTTPS in production) ────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge support
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (no redirect needed)
        location /health {
            proxy_pass http://ark_api;
            proxy_set_header Host $host;
        }

        # In production: redirect all HTTP → HTTPS
        # Uncomment when TLS certificates are configured:
        # return 301 https://$host$request_uri;

        # In development: forward directly
        location / {
            proxy_pass http://ark_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Rate limiting
            limit_req zone=api_general burst=30 nodelay;

            # Timeouts for long-running scans
            proxy_read_timeout 360s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # Stricter rate limits on auth endpoints
        location /api/v1/auth/ {
            proxy_pass http://ark_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api_auth burst=10 nodelay;
        }
    }

    # ── HTTPS Server (enable in production with valid TLS certs) ─────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     location / {
    #         proxy_pass http://ark_api;
    #         # ... same proxy headers as above
    #     }
    # }
}
